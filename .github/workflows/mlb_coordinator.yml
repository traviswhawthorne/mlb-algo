name: MLB Coordinator

on:
  workflow_dispatch:    # manual trigger only

permissions:
  contents: write       # needed so coordinator can commit state back to the repo

jobs:
  coordinate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git push works

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run coordinator
        env:
          ODDS_API_KEY:                ${{ secrets.ODDS_API_KEY }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_PICKS_FILE_ID:        ${{ secrets.GDRIVE_PICKS_FILE_ID }}
          GDRIVE_TRACKER_FILE_ID:      ${{ secrets.GDRIVE_TRACKER_FILE_ID }}
          RESUME_REPO_TOKEN:           ${{ secrets.RESUME_REPO_TOKEN }}
          GMAIL_USER:                  ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
          OUTPUT_FILE:                 MLB_Picks.xlsx
          CI:                          "true"
          TRIGGER_EVENT:               ${{ github.event_name }}
        run: python coordinator.py

